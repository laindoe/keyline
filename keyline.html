<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KEYLINE — chroma-key vectorizer</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="theme-color" content="#10131f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="KEYLINE">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,300..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#10131f;
  --panel:#181d2e;
  --panel-2:#1f2540;
  --line:#2b3252;
  --bone:#e9e6dc;
  --dim:#8b90a8;
  --guide:#8dff5a;
  --anchor:#ff5a3c;
  --ic-art:#ffd54a;
  --ic-dots:#ff4fa3;
  --ic-lines:#45e0f0;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);color:var(--bone);
  font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 100;
  overflow:hidden;touch-action:manipulation;
}
#app{display:flex;flex-direction:column;height:100%;max-width:600px;margin:0 auto;position:relative}
@media(min-width:601px){#app{border-left:1px solid var(--line);border-right:1px solid var(--line)}}

/* ---------- top bar ---------- */
header{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
.regmark{width:20px;height:20px;flex-shrink:0}
.wordmark{font-weight:850;font-size:17px;letter-spacing:.06em;font-variation-settings:'wdth' 118}
.wordmark span{color:var(--guide)}
header .spacer{flex:1}
.iconbtn{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;color:var(--bone);cursor:pointer;border-radius:10px;padding:0;
}
.iconbtn:disabled{opacity:.28;pointer-events:none}
.iconbtn svg{width:20px;height:20px}

/* ---------- drawer (hamburger) ---------- */
.drawer{
  position:absolute;top:52px;left:10px;right:10px;z-index:40;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;display:none;flex-direction:column;gap:12px;
  box-shadow:0 18px 50px rgba(0,0,0,.55);
}
.drawer.open{display:flex}
.sect-title{font-size:11px;font-weight:750;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-variation-settings:'wdth' 112;display:flex;align-items:center;gap:8px}
.sect-title::after{content:'';flex:1;border-top:1px dashed var(--line)}

/* ---------- project row ---------- */
.projrow{display:flex;align-items:center;gap:10px;padding:10px 12px;flex-shrink:0}
.ctl{
  width:100%;padding:11px 12px;border-radius:var(--radius);border:1px solid var(--line);
  background:var(--panel-2);color:var(--bone);font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:.04em;outline:none;
  -webkit-appearance:none;appearance:none;
}
.ctl::placeholder{color:var(--dim)}
select.ctl{
  background-image:linear-gradient(45deg,transparent 50%,var(--dim) 50%),linear-gradient(135deg,var(--dim) 50%,transparent 50%);
  background-position:calc(100% - 18px) 50%,calc(100% - 13px) 50%;
  background-size:5px 5px;background-repeat:no-repeat;
}
.projrow select{flex:1;width:auto;min-width:0}
#bExport{
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  padding:11px 14px;border-radius:12px;cursor:pointer;
  background:transparent;border:1px solid var(--guide);color:var(--guide);
  font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;
  letter-spacing:.08em;text-transform:uppercase;font-variation-settings:'wdth' 110;
}
#bExport:disabled{opacity:.35;pointer-events:none}
#bExport svg{width:15px;height:15px}

/* ---------- stage ---------- */
#stage{position:relative;height:37vh;min-height:230px;flex-shrink:0;border-bottom:1px solid var(--line);
  background-color:var(--stage-bg,var(--ink));
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:28px 28px;background-position:center;}
#cv{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
#emptyStage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dim);pointer-events:none;text-align:center;padding:20px}
#emptyStage .bigdot{width:44px;height:44px;border-radius:50%;border:2px dashed var(--guide);position:relative;opacity:.8}
#emptyStage .bigdot::after{content:'';position:absolute;inset:13px;border-radius:50%;background:var(--anchor)}
#emptyStage p{font-size:12.5px;max-width:280px;line-height:1.55}
#status{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--line);border-radius:99px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--guide);padding:8px 16px;display:none;z-index:5;white-space:nowrap}
#bToggleArt{
  position:absolute;top:10px;right:10px;z-index:6;
  width:26px;height:26px;border-radius:50%;padding:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--panel-2);border:1px solid var(--line);cursor:pointer;
}
#bToggleArt::after{
  content:'';width:11px;height:11px;border-radius:50%;background:var(--anchor);
  opacity:.35;transition:opacity .15s ease,box-shadow .15s ease;
}
#bToggleArt.on::after{opacity:1;box-shadow:0 0 7px color-mix(in srgb,var(--anchor) 70%,transparent)}

#bBgColor{
  position:absolute;top:10px;left:10px;z-index:6;
  width:26px;height:26px;border-radius:50%;padding:0;cursor:pointer;
  border:1px solid var(--line);overflow:hidden;
  background:
    linear-gradient(45deg,#3a4062 25%,transparent 25%,transparent 75%,#3a4062 75%),
    linear-gradient(45deg,#3a4062 25%,var(--panel) 25%,var(--panel) 75%,#3a4062 75%);
  background-size:8px 8px;background-position:0 0,4px 4px;
}
#bBgColor .fillpreview{position:absolute;inset:0;border-radius:50%}
#bBgColor input{position:absolute;inset:-10px;width:46px;height:46px;opacity:0;cursor:pointer}

.zoompanel{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);z-index:6;
  display:flex;flex-direction:column;gap:6px;
}
.zoompanel button{
  width:30px;height:30px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;
  background:var(--panel-2);border:1px solid var(--line);color:var(--bone);cursor:pointer;
  font-family:'Archivo',sans-serif;font-weight:800;font-size:17px;line-height:1;
}
.zoompanel button svg{width:15px;height:15px}
.zoompanel button:active{border-color:var(--guide);color:var(--guide)}

/* ---------- tabs ---------- */
.tabs{display:flex;flex-shrink:0;border-bottom:1px solid var(--line)}
.tabs button{
  flex:1;padding:13px;background:transparent;border:none;cursor:pointer;
  color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:11px;
  letter-spacing:.14em;text-transform:uppercase;
  border-bottom:2px solid transparent;
}
.tabs button.on{color:var(--guide);border-bottom-color:var(--guide);font-weight:600}

/* ---------- layer list ---------- */
#listWrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 46px;display:flex;flex-direction:column;gap:8px}
.row-wrap{position:relative;border-radius:12px;overflow:hidden;flex-shrink:0}
.row-trash{
  position:absolute;top:0;right:0;bottom:0;width:76px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;color:var(--anchor);cursor:pointer;padding:0;
}
.row-trash svg{width:22px;height:22px}

/* ---------- confirm modal ---------- */
#confirmModal{position:fixed;inset:0;z-index:90;display:none;align-items:flex-end;justify-content:center;background:rgba(8,10,18,.55)}
#confirmModal.open{display:flex}
#confirmModal .card{
  width:100%;max-width:600px;background:var(--panel);border:1px solid var(--line);
  border-radius:18px 18px 0 0;padding:22px 18px calc(18px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;gap:14px;
}
#confirmModal .msg{font-family:'Archivo',sans-serif;font-size:15px;font-weight:600;color:var(--bone);text-align:center;line-height:1.4}
#confirmModal .btnrow{display:flex;gap:8px}
#confirmModal .btnrow .btn{flex:1}
.row{
  position:relative;display:flex;align-items:center;gap:5px;padding:7px 8px;
  background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
  touch-action:pan-y;will-change:transform;
}
.row.sel{border-color:var(--guide)}
.row-wrap.dragging{position:relative;z-index:20}
.row-wrap.dragging .row{box-shadow:0 10px 26px -6px rgba(0,0,0,.55);border-color:var(--guide)}
.draghandle{
  width:20px;height:36px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;color:var(--dim);cursor:grab;padding:0;flex-shrink:0;
  touch-action:none;
}
.draghandle svg{width:16px;height:16px}
.row .thumb{width:38px;height:38px;border-radius:9px;background:var(--panel);flex-shrink:0}
.row input.name{
  flex:1;min-width:0;background:transparent;border:none;color:var(--bone);
  font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;outline:none;
  font-variation-settings:'wdth' 106;
}
.row input.name::placeholder{color:var(--dim)}
.icb{
  width:31px;height:36px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;cursor:pointer;padding:0;flex-shrink:0;
}
.icb svg{width:19px;height:19px}
.icb.off{opacity:.26}
.badge{
  display:inline-block;background:color-mix(in srgb,var(--guide) 16%,transparent);
  color:var(--guide);border-radius:6px;font-size:9px;padding:2px 6px;flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em;
}
.swatch{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--line);
  position:relative;overflow:hidden;flex-shrink:0;cursor:pointer;
  background:
    linear-gradient(45deg,#3a4062 25%,transparent 25%,transparent 75%,#3a4062 75%),
    linear-gradient(45deg,#3a4062 25%,var(--panel) 25%,var(--panel) 75%,#3a4062 75%);
  background-size:10px 10px;background-position:0 0,5px 5px;
}
.swatch input{position:absolute;inset:-10px;width:60px;height:60px;opacity:0;cursor:pointer}
select.wsel{
  width:66px;flex-shrink:0;padding:8px 6px;border-radius:9px;border:1px solid var(--line);
  background:var(--panel);color:var(--bone);font-family:'IBM Plex Mono',monospace;font-size:10px;
  -webkit-appearance:none;appearance:none;text-align:center;outline:none;
}

/* ---------- buttons ---------- */
.btn{
  width:100%;padding:13px;border-radius:var(--radius);border:1px solid var(--line);
  background:var(--panel-2);color:var(--bone);font-family:'Archivo',sans-serif;
  font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  font-variation-settings:'wdth' 110;cursor:pointer;flex-shrink:0;
}
.btn.small{padding:9px;font-size:11px}
.btn:disabled{opacity:.35;pointer-events:none}
.btn.ghost{background:transparent}
.btn.accent{color:var(--guide);border-color:color-mix(in srgb,var(--guide) 45%,transparent);background:transparent}
.btn.danger{color:var(--anchor);border-color:color-mix(in srgb,var(--anchor) 40%,transparent);background:transparent}

.slider-row label{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.slider-row label output{color:var(--guide)}
input[type=range]{width:100%;appearance:none;-webkit-appearance:none;height:26px;background:transparent}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:var(--line);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--anchor);margin-top:-9.5px;border:3px solid var(--ink)}
input[type=range]::-moz-range-track{height:3px;background:var(--line);border-radius:2px}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--anchor);border:3px solid var(--ink)}

/* ---------- variant page ---------- */
#varPage{position:absolute;inset:0;z-index:50;background:var(--ink);display:none;flex-direction:column}
#varPage.open{display:flex}
.vhead{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
#bVarBack{
  display:flex;align-items:center;gap:2px;background:none;border:none;cursor:pointer;
  color:var(--guide);font-family:'Archivo',sans-serif;font-weight:750;font-size:14px;padding:6px 8px 6px 0;
}
#bVarBack svg{width:18px;height:18px}
.vtitle{flex:1;text-align:center;font-weight:800;font-size:15px;font-variation-settings:'wdth' 110;margin-right:64px}
#varList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:8px}
.vlabel{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;padding:6px 2px 0}
#varPage>.vfoot{padding:12px;flex-shrink:0}

input[type=file]{display:none}
</style>
</head>
<body>
<div id="app">
<header>
  <button class="iconbtn" id="bMenu" title="menu">
    <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <svg class="regmark" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="9" stroke="var(--guide)" stroke-width="1.6"/>
    <circle cx="12" cy="12" r="3.2" fill="var(--anchor)"/>
    <path d="M12 0v5M12 19v5M0 12h5M19 12h5" stroke="var(--bone)" stroke-width="1.4"/>
  </svg>
  <div class="wordmark">KEY<span>LINE</span></div>
  <div class="spacer"></div>
  <button class="iconbtn" id="bUndo" title="undo" disabled>
    <svg viewBox="0 0 24 24" fill="none"><path d="M4 9h9a6 6 0 1 1 0 12h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="m8 5-4 4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="iconbtn" id="bRedo" title="redo" disabled>
    <svg viewBox="0 0 24 24" fill="none"><path d="M20 9h-9a6 6 0 1 0 0 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="m16 5 4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</header>

<div class="drawer" id="drawer">
  <div class="sect-title">Project</div>
  <input class="ctl" id="projName" placeholder="untitled project">
  <div style="display:flex;gap:6px">
    <button class="btn ghost small" id="bNewProj" style="flex:1">+ New project</button>
    <button class="btn danger small" id="bDelProj" style="flex:1">Delete</button>
  </div>
  <div class="sect-title">Trace settings</div>
  <div class="slider-row">
    <label>Key threshold <output id="oKey">60</output></label>
    <input type="range" id="rKey" min="15" max="160" value="60">
  </div>
  <div class="slider-row">
    <label>Min dot size <output id="oDot">15</output>px&sup2;</label>
    <input type="range" id="rDot" min="3" max="300" value="15">
  </div>
  <div class="slider-row">
    <label>Fit error <output id="oErr">6</output></label>
    <input type="range" id="rErr" min="1" max="40" value="6">
  </div>
  <div class="sect-title">Export</div>
  <button class="btn ghost small" id="bCopy" disabled>Copy SVG code</button>
</div>

<div class="projrow">
  <select class="ctl" id="projSel"></select>
  <button id="bExport" disabled>
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 15V3m0 0L8 7m4-4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 13v6h14v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Export SVG
  </button>
</div>

<div id="stage">
  <canvas id="cv"></canvas>
  <button id="bBgColor" title="workspace background color">
    <span class="fillpreview" id="bgPreview" style="background:#10131f"></span>
    <input type="color" id="bgColorInput" value="#10131f">
  </button>
  <div class="zoompanel">
    <button id="bZoomIn" title="zoom in">+</button>
    <button id="bZoomOut" title="zoom out">&minus;</button>
    <button id="bZoomFit" title="fit to view">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <button id="bToggleArt" title="toggle art underlay"></button>
  <div id="emptyStage">
    <div class="bigdot"></div>
    <p>Add a layer. Each piece takes three frames: the art, its anchor dots, and the guide lines connecting them.</p>
  </div>
  <div id="status"></div>
</div>

<div class="tabs">
  <button id="tabGeo" class="on">Geometry</button>
  <button id="tabApp">Appearance</button>
</div>

<div id="listWrap">
  <div id="layerList" style="display:flex;flex-direction:column;gap:8px"></div>
  <button class="btn accent" id="bAddLayer">+ Add layer</button>
</div>

<div id="varPage">
  <div class="vhead">
    <button id="bVarBack">
      <svg viewBox="0 0 24 24" fill="none"><path d="m14 5-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>
    <div class="vtitle" id="varTitle">Variants</div>
  </div>
  <div id="varList"></div>
  <div class="vfoot">
    <button class="btn accent" id="bAddVar">+ Add variant</button>
  </div>
</div>

<div id="confirmModal">
  <div class="card">
    <div class="msg" id="confirmMsg">Delete this?</div>
    <div class="btnrow">
      <button class="btn ghost" id="bConfirmCancel">Cancel</button>
      <button class="btn danger" id="bConfirmOk">Delete</button>
    </div>
  </div>
</div>
</div>

<input type="file" id="filePick" accept="image/*">

<script>
'use strict';
/* ============================================================
   KEYLINE v3 — layered chroma-key vectorizer
   Geometry tab: build pieces. Each piece = 3 frames (art /
   dots / lines) -> keyed -> skeleton -> anchor-guided bezier
   fit. Pieces can hold variants (eye open / closed ...), one
   active at a time. Appearance tab: one fill + one stroke +
   stroke width per piece. Export one SVG with a <g> per piece,
   or a single piece's SVG from its row.
   ============================================================ */

const WORK_MAX = 1300;
const $ = id => document.getElementById(id);

const state = {
  layers:[],            // Layer objects (see newLayer)
  selId:null,
  tab:'geo',            // 'geo' | 'app'
  view:{x:0,y:0,z:0.5},
  viewInit:false,
  docW:0, docH:0,       // doc space = first frame's original dims
  showArt:{geo:false,app:true}, // art-underlay visibility, tracked per tab
};
let uid=1;
let varLayerId=null;    // layer whose variant page is open

/* a "content" is one traceable unit: the layer's own default
   frames, or one of its variants */
function newContent(){
  return {
    id:uid++, name:'',
    art:null, dots:null, lines:null,      // Image objects
    origW:0, origH:0, scale:1, W:0, H:0,
    anchors:[], paths:[], curves:[],
    traced:false, stats:'',
  };
}
function newLayer(){
  return {
    ...newContent(),
    visible:true,
    fill:null, stroke:'#000000', strokeW:2, // appearance (per piece)
    tx:0, ty:0, s:1, rot:0,                 // per-piece transform (rot in radians)
    variants:[], activeVar:-1,              // -1 = default content
  };
}
const activeContent=L=> (L.activeVar>=0 && L.variants[L.activeVar]) ? L.variants[L.activeVar] : L;
const layerLabel=L=>L.name||('part '+L.id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

/* ================= canvas & view ================= */
const cv=$('cv'), ctx=cv.getContext('2d');

function fitView(){
  const r=cv.getBoundingClientRect();
  cv.width=r.width*devicePixelRatio;
  cv.height=r.height*devicePixelRatio;
  if(state.docW && !state.viewInit){
    const z=Math.min(cv.width/state.docW, cv.height/state.docH)*0.9;
    state.view={z, x:(cv.width-state.docW*z)/2, y:(cv.height-state.docH*z)/2};
    state.viewInit=true;
  }
  draw();
}
window.addEventListener('resize', ()=>{state.viewInit=false;fitView();});

/* effective stroke width in original-pixel space: the UI's small
   "px" numbers are display-scale units; scale them against the doc
   so "2 px" looks like 2px regardless of source resolution */
const strokePx=L=>(L.strokeW==null?2:L.strokeW)*Math.max(1,(state.docW||500)/500);

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const {x,y,z}=state.view;
  ctx.save(); ctx.translate(x,y); ctx.scale(z,z);

  if(state.docW){ // doc bounds
    ctx.strokeStyle='#2b3252'; ctx.lineWidth=1.5/z;
    ctx.setLineDash([8/z,6/z]);
    ctx.strokeRect(0,0,state.docW,state.docH);
    ctx.setLineDash([]);
  }

  for(const L of state.layers){
    if(!L.visible)continue;
    const C=activeContent(L);
    const k=C.scale? (1/C.scale):1;             // working -> original px
    ctx.save();
    ctx.translate(L.tx,L.ty); ctx.scale(L.s,L.s);
    if(L.rot){
      const cx2=C.origW/2, cy2=C.origH/2;
      ctx.translate(cx2,cy2); ctx.rotate(L.rot); ctx.translate(-cx2,-cy2);
    }

    if(C.art && state.showArt[state.tab]){ try{ ctx.drawImage(C.art,0,0,C.origW,C.origH); }catch(e){} }

    // preview marker frames on the selected layer before vectorizing,
    // so an upload always gives visible on-canvas confirmation
    if(L.id===state.selId && state.tab==='geo'){
      try{
        if(C.lines && !C.traced){ ctx.globalAlpha=0.55; ctx.drawImage(C.lines,0,0,C.origW,C.origH); ctx.globalAlpha=1; }
        if(C.dots && !C.traced){ ctx.globalAlpha=0.55; ctx.drawImage(C.dots,0,0,C.origW,C.origH); ctx.globalAlpha=1; }
      }catch(e){ ctx.globalAlpha=1; }
    }

    if(C.curves.length){
      const selTint = state.tab==='geo' && L.id===state.selId;
      ctx.lineWidth=Math.max(strokePx(L),1.2/z)/L.s;
      ctx.lineCap='round';ctx.lineJoin='round';
      for(const c of C.curves){
        ctx.beginPath();
        for(const s of c.segs){
          ctx.moveTo(s[0][0]*k,s[0][1]*k);
          ctx.bezierCurveTo(s[1][0]*k,s[1][1]*k,s[2][0]*k,s[2][1]*k,s[3][0]*k,s[3][1]*k);
        }
        if(c.closed){
          ctx.closePath();
          if(state.tab==='app' && L.fill){ ctx.fillStyle=L.fill; ctx.fill(); }
        }
        // Geometry is shape-only — color belongs to Appearance. A
        // selected piece's outline tints green there; everywhere else
        // (and always in Appearance) the real assigned stroke shows.
        ctx.strokeStyle = state.tab==='app' ? (L.stroke||'#000') : (selTint?'#8dff5a':'#e9e6dc');
        ctx.stroke();
      }
    }

    if(L.id===state.selId && state.tab==='geo'){
      for(const a of C.anchors){
        ctx.beginPath();
        ctx.arc(a.x*k,a.y*k, 7/(z*L.s), 0, 7);
        ctx.fillStyle='#ff5a3c'; ctx.fill();
        ctx.lineWidth=2/(z*L.s); ctx.strokeStyle='#10131f'; ctx.stroke();
      }
      ctx.strokeStyle='#8dff5a'; ctx.lineWidth=1.5/(z*L.s);
      ctx.setLineDash([10/(z*L.s),8/(z*L.s)]);
      ctx.strokeRect(0,0,C.origW,C.origH);
      ctx.setLineDash([]);
    }
    ctx.restore();
  }
  ctx.restore();
}

/* gestures: with a piece selected (Geometry tab), one-finger drag
   moves *that piece only* (tx/ty) so pieces from separately-exported
   source docs can be lined up by hand; two-finger pinch always pans/
   zooms the shared view regardless of selection (distance ratio), and
   simultaneously twisting two fingers rotates the selected piece
   (angle delta, around its own center) — the two are independent,
   computed from the same pair of touch points each frame. With
   nothing selected, one-finger drag falls back to panning the view,
   and a two-finger twist has nothing to rotate. Matches the touch/
   finger-count convention of Procreate etc. rather than a Pan/Move/
   Rotate mode toggle. */
let touches=new Map();
let moveUndoPushed=false;
function selectedLayerForMove(){
  return state.tab==='geo' ? state.layers.find(l=>l.id===state.selId) : null;
}
cv.addEventListener('pointerdown', e=>{
  touches.set(e.pointerId,{x:e.clientX,y:e.clientY});
  cv.setPointerCapture(e.pointerId);
  if(touches.size===1 && !moveUndoPushed && selectedLayerForMove()){
    pushUndo(); moveUndoPushed=true;
  }
});
cv.addEventListener('pointermove', e=>{
  if(!touches.has(e.pointerId)) return;
  const t=touches.get(e.pointerId);
  const dx=(e.clientX-t.x)*devicePixelRatio, dy=(e.clientY-t.y)*devicePixelRatio;

  if(touches.size===1){
    const sel=selectedLayerForMove();
    if(sel){
      sel.tx+=dx/state.view.z; sel.ty+=dy/state.view.z;
      scheduleSave();
    } else {
      state.view.x+=dx; state.view.y+=dy;
    }
  } else if(touches.size===2){
    const arr=[...touches.entries()];
    const other=arr.find(([id])=>id!==e.pointerId)[1];
    const d0=Math.hypot(t.x-other.x,t.y-other.y);
    const d1=Math.hypot(e.clientX-other.x,e.clientY-other.y);
    const f=d1/(d0||1);
    const cx=(e.clientX+other.x)/2*devicePixelRatio, cy=(e.clientY+other.y)/2*devicePixelRatio;
    state.view.x=cx-(cx-state.view.x)*f;
    state.view.y=cy-(cy-state.view.y)*f;
    state.view.z*=f;

    // twisting two fingers rotates the selected piece — independent of
    // the pinch-distance zoom above, computed from the same two points
    const sel=selectedLayerForMove();
    if(sel){
      const ang0=Math.atan2(t.y-other.y,t.x-other.x);
      const ang1=Math.atan2(e.clientY-other.y,e.clientX-other.x);
      let dAngle=ang1-ang0;
      if(dAngle>Math.PI)dAngle-=2*Math.PI;
      if(dAngle<-Math.PI)dAngle+=2*Math.PI;
      sel.rot=(sel.rot||0)+dAngle;
      scheduleSave();
    }
  }
  touches.set(e.pointerId,{x:e.clientX,y:e.clientY});
  draw();
});
const endT=e=>{ touches.delete(e.pointerId); if(!touches.size)moveUndoPushed=false; };
cv.addEventListener('pointerup',endT);
cv.addEventListener('pointercancel',endT);
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.9;
  const cx=e.offsetX*devicePixelRatio, cy=e.offsetY*devicePixelRatio;
  state.view.x=cx-(cx-state.view.x)*f;
  state.view.y=cy-(cy-state.view.y)*f;
  state.view.z*=f; draw();
},{passive:false});

/* ================= undo / redo ================= */
const undoStack=[], redoStack=[];
function snapContent(C){
  return {...C, _artCv:null,
    anchors:structuredClone(C.anchors), paths:structuredClone(C.paths),
    curves:structuredClone(C.curves), variants:undefined};
}
function snapLayer(L){
  const s=snapContent(L);
  s.variants=L.variants.map(snapContent);
  return s;
}
function takeSnap(){
  return {layers:state.layers.map(snapLayer), selId:state.selId, docW:state.docW, docH:state.docH};
}
function pushUndo(){
  undoStack.push(takeSnap());
  if(undoStack.length>25)undoStack.shift();
  redoStack.length=0;
  updateHistoryUI();
}
function applySnap(s){
  state.layers=s.layers.map(snapLayer);
  state.selId=s.selId; state.docW=s.docW; state.docH=s.docH;
  if(varLayerId!==null && !state.layers.some(l=>l.id===varLayerId)) closeVarPage();
  renderAll(); draw(); updateExport(); scheduleSave();
}
function updateHistoryUI(){
  $('bUndo').disabled=!undoStack.length;
  $('bRedo').disabled=!redoStack.length;
}
$('bUndo').addEventListener('click',()=>{
  if(!undoStack.length)return;
  redoStack.push(takeSnap());
  applySnap(undoStack.pop());
  updateHistoryUI();
});
$('bRedo').addEventListener('click',()=>{
  if(!redoStack.length)return;
  undoStack.push(takeSnap());
  applySnap(redoStack.pop());
  updateHistoryUI();
});

/* ================= toast ================= */
function toast(msg,ms=2000){
  const s=$('status');s.textContent=msg;s.style.display='block';
  clearTimeout(s._t);s._t=setTimeout(()=>s.style.display='none',ms);
}

/* ================= confirm modal =================
   window.confirm() is unreliable here: iOS silently no-ops alert/
   confirm/prompt for web apps launched from the home screen
   (standalone display mode), which is exactly how this app is meant
   to be used — so a destructive action gated on confirm() could fire
   with no dialog ever shown. This in-app modal replaces every use. */
let _confirmResolve=null;
function askConfirm(msg,okLabel='Delete'){
  return new Promise(res=>{
    _confirmResolve=res;
    $('confirmMsg').textContent=msg;
    $('bConfirmOk').textContent=okLabel;
    $('confirmModal').classList.add('open');
  });
}
function _settleConfirm(v){
  $('confirmModal').classList.remove('open');
  const r=_confirmResolve; _confirmResolve=null;
  if(r)r(v);
}
$('bConfirmCancel').addEventListener('click',()=>_settleConfirm(false));
$('bConfirmOk').addEventListener('click',()=>_settleConfirm(true));
$('confirmModal').addEventListener('click',e=>{ if(e.target.id==='confirmModal')_settleConfirm(false); });

$('bMenu').addEventListener('click',e=>{
  e.stopPropagation();
  $('drawer').classList.toggle('open');
});
document.addEventListener('click',e=>{
  const d=$('drawer');
  if(d.classList.contains('open') && !d.contains(e.target) && e.target!==$('bMenu') && !$('bMenu').contains(e.target))
    d.classList.remove('open');
});

function drawThumb(canvas,L,C){
  const g=canvas.getContext('2d');
  const N=canvas.width;
  g.clearRect(0,0,N,N);
  if(C.art){
    try{
      const k=Math.min(N/C.origW,N/C.origH);
      g.drawImage(C.art,(N-C.origW*k)/2,(N-C.origH*k)/2,C.origW*k,C.origH*k);
      return;
    }catch(e){}
  }
  if(C.curves.length){
    const kk=(C.scale?1/C.scale:1);
    const k=Math.min(N/(C.origW||1),N/(C.origH||1));
    g.strokeStyle='#e9e6dc'; g.lineWidth=2; g.lineCap='round';
    g.save();
    g.translate((N-(C.origW||0)*k)/2,(N-(C.origH||0)*k)/2);
    g.scale(k,k);
    g.beginPath();
    for(const c of C.curves)for(const s of c.segs){
      g.moveTo(s[0][0]*kk,s[0][1]*kk);
      g.bezierCurveTo(s[1][0]*kk,s[1][1]*kk,s[2][0]*kk,s[2][1]*kk,s[3][0]*kk,s[3][1]*kk);
    }
    g.lineWidth=2/k;
    g.stroke();
    g.restore();
    return;
  }
  g.strokeStyle='#2b3252'; g.lineWidth=2;
  g.beginPath(); g.arc(N/2,N/2,N*0.28,0,7); g.stroke();
}

}

/* swipe-to-reveal-trash: horizontal drag on a row slides it left to
   expose the trash button underneath (iOS Mail-style). Decides
   horizontal-vs-vertical from the first ~8px of movement so vertical
   list scrolling still works normally (touch-action:pan-y backs this
   up at the CSS level). Only one row stays open at a time. */
let activeSwipe=null;
const SWIPE_REVEAL=76;
function wireSwipe(row){
  let startX=0,startY=0,decided=false,horiz=false,dragging=false,open=false,pid=null;
  const setX=(px,animate)=>{
    row.style.transition=animate?'transform .18s ease':'none';
    row.style.transform=px?`translateX(${px}px)`:'';
  };
  const close=(animate=true)=>{
    open=false; setX(0,animate);
    if(activeSwipe&&activeSwipe.el===row)activeSwipe=null;
  };
  row.addEventListener('pointerdown',e=>{
    if(e.isPrimary===false)return;
    startX=e.clientX; startY=e.clientY; decided=false; horiz=false; dragging=true; pid=e.pointerId;
  });
  row.addEventListener('pointermove',e=>{
    if(!dragging||e.pointerId!==pid)return;
    const ddx=e.clientX-startX, ddy=e.clientY-startY;
    if(!decided){
      if(Math.abs(ddx)<8&&Math.abs(ddy)<8)return;
      decided=true; horiz=Math.abs(ddx)>Math.abs(ddy);
      if(horiz){ try{row.setPointerCapture(pid);}catch(err){} }
      else { dragging=false; return; } // hand off to native vertical scroll
    }
    let t=(open?-SWIPE_REVEAL:0)+ddx;
    t=Math.max(-SWIPE_REVEAL-14,Math.min(0,t));
    setX(t,false);
  });
  // releasing a real drag also fires a native 'click' on this row —
  // without this, that synthetic click reaches wireRow's handler and
  // (seeing the swipe now open) immediately closes what was just opened
  const suppressNextClick=e=>{ e.stopPropagation(); e.preventDefault(); };
  const end=e=>{
    if(!dragging||e.pointerId!==pid)return;
    dragging=false;
    if(!decided||!horiz)return;
    row.addEventListener('click',suppressNextClick,{capture:true,once:true});
    const ddx=e.clientX-startX;
    const finalX=(open?-SWIPE_REVEAL:0)+ddx;
    if(finalX<-SWIPE_REVEAL*0.4){
      open=true; setX(-SWIPE_REVEAL,true);
      if(activeSwipe&&activeSwipe.el!==row)activeSwipe.close(true);
      activeSwipe={el:row,close};
    } else {
      close(true);
    }
  };
  row.addEventListener('pointerup',end);
  row.addEventListener('pointercancel',e=>{ dragging=false; });
  return {close,isOpen:()=>open};
}
document.addEventListener('pointerdown',e=>{
  if(activeSwipe && !activeSwipe.el.contains(e.target))activeSwipe.close();
},true);

/* drag-to-reorder via the grip handle. Other rows are shifted purely
   with CSS transforms while dragging (classic translate-based
   reorder), and the real state.layers array — and the DOM — only get
   touched once, on release. Scoped to the Geometry list; Appearance
   renders the same array so order changes there too. */
let dragCtx=null;
function wireDragHandle(handle,wrap,L){
  handle.addEventListener('pointerdown',e=>{
    e.stopPropagation(); e.preventDefault();
    if(activeSwipe)activeSwipe.close();
    const order=[...state.layers];
    const fromIndex=order.indexOf(L);
    const wraps=[...layerList.querySelectorAll('.row-wrap')];
    const rects=wraps.map(w=>w.getBoundingClientRect());
    const rowStep=wraps.length>1?(rects[1].top-rects[0].top):(rects[0]?.height||60);
    wrap.classList.add('dragging');
    try{handle.setPointerCapture(e.pointerId);}catch(err){}
    dragCtx={pid:e.pointerId,L,wrap,order,fromIndex,curIndex:fromIndex,startY:e.clientY,rowStep,wraps};
  });
  handle.addEventListener('pointermove',e=>{
    if(!dragCtx||dragCtx.pid!==e.pointerId)return;
    const dy=e.clientY-dragCtx.startY;
    dragCtx.wrap.style.transform=`translateY(${dy}px)`;
    const steps=Math.round(dy/dragCtx.rowStep);
    const newIndex=Math.max(0,Math.min(dragCtx.order.length-1,dragCtx.fromIndex+steps));
    if(newIndex!==dragCtx.curIndex){
      dragCtx.curIndex=newIndex;
      dragCtx.wraps.forEach((w,i)=>{
        if(w===dragCtx.wrap)return;
        let shift=0;
        if(dragCtx.curIndex>dragCtx.fromIndex && i>dragCtx.fromIndex && i<=dragCtx.curIndex) shift=-1;
        else if(dragCtx.curIndex<dragCtx.fromIndex && i<dragCtx.fromIndex && i>=dragCtx.curIndex) shift=1;
        w.style.transition='transform .15s ease';
        w.style.transform=shift?`translateY(${shift*dragCtx.rowStep}px)`:'';
      });
    }
  });
  const end=e=>{
    if(!dragCtx||dragCtx.pid!==e.pointerId)return;
    const {wrap:draggedWrap,wraps,order,fromIndex,curIndex}=dragCtx;
    dragCtx=null;
    draggedWrap.classList.remove('dragging');
    wraps.forEach(w=>{ w.style.transition=''; w.style.transform=''; });
    if(curIndex!==fromIndex){
      pushUndo();
      const moved=order.splice(fromIndex,1)[0];
      order.splice(curIndex,0,moved);
      state.layers=order;
      renderAll(); draw(); updateExport(); scheduleSave();
    }
  };
  handle.addEventListener('pointerup',end);
  handle.addEventListener('pointercancel',end);
}

/* readonly input that unlocks for editing on double-tap and relocks on
   blur — iOS keeps the keyboard away from readonly inputs, so a plain
   row tap never starts a rename. The double-tap timer is keyed by a
   stable id (not a per-element closure var): the first tap of a
   double-tap also *selects* the row, which triggers a renderList()
   that destroys and recreates this exact input — a plain local
   variable would lose the first tap's timestamp right when the
   second tap lands on the freshly-rebuilt node. */
const _lastNameTap=new Map();
function editableOnDblTap(input,key){
  const unlock=()=>{
    input.readOnly=false;
    input.focus();
    try{ input.setSelectionRange(0,input.value.length); }catch(e){}
  };
  input.addEventListener('dblclick',unlock);
  input.addEventListener('pointerup',()=>{
    const now=Date.now();
    if(now-(_lastNameTap.get(key)||0)<400)unlock();
    _lastNameTap.set(key,now);
  });
  input.addEventListener('blur',()=>{ input.readOnly=true; });
}

function wireRow(el,L,C){
  el.addEventListener('click',e=>{
    if(el._swipe&&el._swipe.isOpen()){ el._swipe.close(); return; }
    const btn=e.target.closest('[data-act]');
    const act=btn?.dataset.act;
    if(!act){
      if(state.selId!==L.id){ state.selId=L.id; renderAll(); draw(); }
      return;
    }
    if(act==='vis'){ pushUndo(); L.visible=!L.visible; renderAll(); draw(); updateExport(); scheduleSave(); }
    if(['art','dots','lines'].includes(act)) pickFile(L,C,act);
    if(act==='dl') downloadSVG([{L,C}], layerLabel(L));
    if(act==='var'){
      if(!L.variants.length){
        pushUndo();
        const v=newContent();
        L.variants.push(v);
        scheduleSave();
      }
      openVarPage(L);
    }
  });
  const name=el.querySelector('[data-act=name]');
  if(name){
    // tapping the name only selects the row; renaming is an explicit
    // double-tap so the keyboard doesn't pop on every row touch
    editableOnDblTap(name,L.id);
    name.addEventListener('input',e=>{L.name=e.target.value;scheduleSave();});
    name.addEventListener('click',()=>{ if(state.selId!==L.id){state.selId=L.id;renderAll();draw();} });
  }
  const fill=el.querySelector('input[data-act=fill]');
  if(fill){
    fill.addEventListener('pointerdown',()=>pushUndo(),{once:true});
    fill.addEventListener('input',e=>{
      L.fill=e.target.value;
      const sw=e.target.closest('.swatch').querySelector('span');
      if(sw)sw.style.background=L.fill;
      draw(); scheduleSave();
    });
  }
  const stroke=el.querySelector('input[data-act=stroke]');
  if(stroke){
    stroke.addEventListener('pointerdown',()=>pushUndo(),{once:true});
    stroke.addEventListener('input',e=>{
      L.stroke=e.target.value;
      const sw=e.target.closest('.swatch').querySelector('span');
      if(sw)sw.style.background=L.stroke;
      draw(); scheduleSave();
    });
  }
  const wsel=el.querySelector('select[data-act=wsel]');
  if(wsel){
    wsel.addEventListener('change',e=>{
      pushUndo();
      L.strokeW=+e.target.value;
      draw(); scheduleSave();
    });
  }
}

      if(['art','dots','lines'].includes(act)) pickFile(L,C,act);
      if(act==='dl') downloadSVG([{L,C}], (idx<0?layerLabel(L):(C.name||layerLabel(L)+'-variant')));

    lbl2.className='vlabel'; lbl2.textContent='Variants';
    list.appendChild(lbl2);

function pickFile(L,C,slot){ pendingSlot={L,C,slot}; $('filePick').click(); }

/* ================= keying ================= */
function imageDataOf(img,C){
  const c=document.createElement('canvas');
  c.width=C.W;c.height=C.H;
  const g=c.getContext('2d',{willReadFrequently:true});
  g.drawImage(img,0,0,C.W,C.H);
  return g.getImageData(0,0,C.W,C.H);
}

/* HSV conversion for hue-based mark detection */
function rgb2hsv(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0;
  if(d!==0){
    if(max===r)h=60*(((g-b)/d)%6);
    else if(max===g)h=60*((b-r)/d+2);
    else h=60*((r-g)/d+4);
  }
  if(h<0)h+=360;
  const s=max===0?0:d/max, v=max;
  return{h,s,v};
}
function hueDist(a,b){ const d=Math.abs(a-b)%360; return d>180?360-d:d; }

/* Key marks two ways depending on how the frame was exported:
   - transparent background (Procreate layer export with nothing else
     on it): every non-transparent pixel IS a mark, regardless of what
     color you drew it in. Alpha alone settles it, no hue guessing.
   - opaque background (flattened frame with the full artwork visible
     underneath the marks): alpha can't help since everything's opaque,
     so fall back to hue — asking "which pixels are red/green" — since
     that's the only signal left to separate marks from art.
   tol (15-160 from the UI slider) widens the hue window and loosens
   the saturation/value floor as it increases; only relevant in the
   opaque fallback case. */
function hueMask(imgData,targetHue,tol){
  const {data}=imgData, W=imgData.width,H=imgData.height,N=W*H;
  const mask=new Uint8Array(N);
  let hasAlpha=false;
  for(let i=3;i<data.length;i+=4){ if(data[i]<250){hasAlpha=true;break;} }

  if(hasAlpha){
    // transparent-background export: alpha alone identifies every mark,
    // any color is fine
    for(let i=0;i<N;i++) mask[i]=data[i*4+3]>=40?1:0;
    return mask;
  }

  // opaque fallback: distinguish marks from artwork by color
  const hueWindow=16+tol*0.35;
  const minSat=Math.max(0.22,0.5-tol*0.0015);
  const minVal=0.18;
  for(let i=0;i<N;i++){
    const j=i*4;
    const {h,s,v}=rgb2hsv(data[j],data[j+1],data[j+2]);
    if(s>=minSat && v>=minVal && hueDist(h,targetHue)<=hueWindow) mask[i]=1;
  }
  return mask;
}

/* connected components -> centroids */
function findBlobs(mask,W,H,minArea){
  const seen=new Uint8Array(mask.length),out=[];
  const qx=new Int32Array(mask.length),qy=new Int32Array(mask.length);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const i=y*W+x;
    if(!mask[i]||seen[i])continue;
    let head=0,tail=0;qx[tail]=x;qy[tail]=y;tail++;seen[i]=1;
    let sx=0,sy=0,n=0;
    while(head<tail){
      const cx=qx[head],cy=qy[head];head++;
      sx+=cx;sy+=cy;n++;
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        const nx=cx+dx,ny=cy+dy;
        if(nx<0||ny<0||nx>=W||ny>=H)continue;
        const ni=ny*W+nx;
        if(mask[ni]&&!seen[ni]){seen[ni]=1;qx[tail]=nx;qy[tail]=ny;tail++;}
      }
    }
    if(n>=minArea&&n<W*H*0.2)out.push({x:sx/n,y:sy/n,area:n});
  }
  return out;
}

/* Zhang–Suen thinning */
function thin(mask,W,H){
  const m=Uint8Array.from(mask);
  const idx=(x,y)=>y*W+x;
  let changed=true,guard=0;
  const toClear=[];
  while(changed&&guard++<80){
    changed=false;
    for(let pass=0;pass<2;pass++){
      toClear.length=0;
      for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++){
        const i=idx(x,y);if(!m[i])continue;
        const p2=m[idx(x,y-1)],p3=m[idx(x+1,y-1)],p4=m[idx(x+1,y)],p5=m[idx(x+1,y+1)],
              p6=m[idx(x,y+1)],p7=m[idx(x-1,y+1)],p8=m[idx(x-1,y)],p9=m[idx(x-1,y-1)];
        const B=p2+p3+p4+p5+p6+p7+p8+p9;
        if(B<2||B>6)continue;
        let A=0;const seq=[p2,p3,p4,p5,p6,p7,p8,p9,p2];
        for(let k=0;k<8;k++)if(seq[k]===0&&seq[k+1]===1)A++;
        if(A!==1)continue;
        if(pass===0){if(p2*p4*p6!==0||p4*p6*p8!==0)continue;}
        else{if(p2*p4*p8!==0||p2*p6*p8!==0)continue;}
        toClear.push(i);
      }
      if(toClear.length){changed=true;for(const i of toClear)m[i]=0;}
    }
  }
  return m;
}

/* skeleton -> ordered polylines */
function tracePaths(skel,W,H){
  const nb=(x,y)=>{
    const out=[];
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      if(!dx&&!dy)continue;
      const nx=x+dx,ny=y+dy;
      if(nx<0||ny<0||nx>=W||ny>=H)continue;
      if(skel[ny*W+nx])out.push([nx,ny]);
    }
    return out;
  };
  const visited=new Uint8Array(skel.length);
  const paths=[],pts=[];
  for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(skel[y*W+x])pts.push([x,y]);
  const deg=p=>nb(p[0],p[1]).length;
  const endpoints=pts.filter(p=>deg(p)===1);
  const starts=[...endpoints,...pts];
  for(const s of starts){
    if(visited[s[1]*W+s[0]])continue;
    const path=[s];visited[s[1]*W+s[0]]=1;
    let cur=s,prev=null;
    while(true){
      const cand=nb(cur[0],cur[1]).filter(p=>!visited[p[1]*W+p[0]]);
      if(!cand.length)break;
      let next=cand[0];
      if(prev&&cand.length>1){
        const dx=cur[0]-prev[0],dy=cur[1]-prev[1];
        let best=-2;
        for(const c of cand){
          const vx=c[0]-cur[0],vy=c[1]-cur[1];
          const dot=(dx*vx+dy*vy)/(Math.hypot(dx,dy)*Math.hypot(vx,vy)||1);
          if(dot>best){best=dot;next=c;}
        }
      }
      visited[next[1]*W+next[0]]=1;
      path.push(next);prev=cur;cur=next;
    }
    if(path.length<10)continue;
    const a=path[0],b=path[path.length-1];
    const closed=Math.hypot(a[0]-b[0],a[1]-b[1])<4&&path.length>30;
    paths.push({pts:path,closed});
  }
  return paths;
}

/* ============ Schneider bezier fitting ============ */
const V={sub:(a,b)=>[a[0]-b[0],a[1]-b[1]],add:(a,b)=>[a[0]+b[0],a[1]+b[1]],
  scale:(a,s)=>[a[0]*s,a[1]*s],dot:(a,b)=>a[0]*b[0]+a[1]*b[1],
  len:a=>Math.hypot(a[0],a[1]),
  norm(a){const l=Math.hypot(a[0],a[1])||1;return[a[0]/l,a[1]/l];}};

function fitCurveSeg(points,leftTan,rightTan,error){
  if(points.length<2)return[];
  if(points.length===2){
    const d=V.len(V.sub(points[1],points[0]))/3;
    return[[points[0],V.add(points[0],V.scale(leftTan,d)),V.add(points[1],V.scale(rightTan,d)),points[1]]];
  }
  return fitCubic(points,leftTan,rightTan,error,0);
}
function fitCubic(pts,lt,rt,err,depth){
  if(depth>16){
    const out=[];
    for(let i=0;i<pts.length-1;i++){
      const d=V.len(V.sub(pts[i+1],pts[i]))/3;
      const t=V.norm(V.sub(pts[i+1],pts[i]));
      out.push([pts[i],V.add(pts[i],V.scale(t,d)),V.add(pts[i+1],V.scale(t,-d)),pts[i+1]]);
    }
    return out;
  }
  let u=chordLen(pts);
  let bez=genBezier(pts,u,lt,rt);
  let [maxE,split]=maxError(pts,bez,u);
  if(maxE<err)return[bez];
  if(maxE<err*err){
    for(let i=0;i<12;i++){
      u=reparam(pts,u,bez);
      bez=genBezier(pts,u,lt,rt);
      [maxE,split]=maxError(pts,bez,u);
      if(maxE<err)return[bez];
    }
  }
  split=Math.max(1,Math.min(pts.length-2,split));
  const centerTan=V.norm(V.sub(pts[split-1],pts[split+1]));
  return[...fitCubic(pts.slice(0,split+1),lt,centerTan,err,depth+1),
         ...fitCubic(pts.slice(split),V.scale(centerTan,-1),rt,err,depth+1)];
}
function chordLen(pts){
  const u=[0];
  for(let i=1;i<pts.length;i++)u.push(u[i-1]+V.len(V.sub(pts[i],pts[i-1])));
  const t=u[u.length-1]||1;return u.map(v=>v/t);
}
function genBezier(pts,u,lt,rt){
  const n=pts.length,first=pts[0],last=pts[n-1];
  let c00=0,c01=0,c11=0,x0=0,x1=0;
  for(let i=0;i<n;i++){
    const t=u[i],b1=3*t*(1-t)**2,b2=3*t*t*(1-t),b0=(1-t)**3,b3=t**3;
    const a0=V.scale(lt,b1),a1=V.scale(rt,b2);
    c00+=V.dot(a0,a0);c01+=V.dot(a0,a1);c11+=V.dot(a1,a1);
    const tmp=V.sub(pts[i],V.add(V.scale(first,b0+b1),V.scale(last,b2+b3)));
    x0+=V.dot(a0,tmp);x1+=V.dot(a1,tmp);
  }
  const det=c00*c11-c01*c01;
  let aL=0,aR=0;
  if(Math.abs(det)>1e-12){aL=(c11*x0-c01*x1)/det;aR=(c00*x1-c01*x0)/det;}
  const segLen=V.len(V.sub(last,first)),eps=1e-6*segLen;
  if(aL<eps||aR<eps){aL=aR=segLen/3;}
  return[first,V.add(first,V.scale(lt,aL)),V.add(last,V.scale(rt,aR)),last];
}
function bezPoint(b,t){
  const mt=1-t;
  return[mt**3*b[0][0]+3*mt*mt*t*b[1][0]+3*mt*t*t*b[2][0]+t**3*b[3][0],
         mt**3*b[0][1]+3*mt*mt*t*b[1][1]+3*mt*t*t*b[2][1]+t**3*b[3][1]];
}
function maxError(pts,bez,u){
  let max=0,split=pts.length>>1;
  for(let i=1;i<pts.length-1;i++){
    const p=bezPoint(bez,u[i]);
    const d=(p[0]-pts[i][0])**2+(p[1]-pts[i][1])**2;
    if(d>max){max=d;split=i;}
  }
  return[Math.sqrt(max),split];
}
function reparam(pts,u,bez){
  return u.map((t,i)=>{
    const d=bezPoint(bez,t),q1=bezDeriv(bez,t),q2=bezDeriv2(bez,t);
    const dv=[d[0]-pts[i][0],d[1]-pts[i][1]];
    const num=dv[0]*q1[0]+dv[1]*q1[1];
    const den=q1[0]**2+q1[1]**2+dv[0]*q2[0]+dv[1]*q2[1];
    return den===0?t:Math.min(1,Math.max(0,t-num/den));
  });
}
function bezDeriv(b,t){
  const mt=1-t;
  return[3*mt*mt*(b[1][0]-b[0][0])+6*mt*t*(b[2][0]-b[1][0])+3*t*t*(b[3][0]-b[2][0]),
         3*mt*mt*(b[1][1]-b[0][1])+6*mt*t*(b[2][1]-b[1][1])+3*t*t*(b[3][1]-b[2][1])];
}
function bezDeriv2(b,t){
  const mt=1-t;
  return[6*mt*(b[2][0]-2*b[1][0]+b[0][0])+6*t*(b[3][0]-2*b[2][0]+b[1][0]),
         6*mt*(b[2][1]-2*b[1][1]+b[0][1])+6*t*(b[3][1]-2*b[2][1]+b[1][1])];
}

/* ============ fill seeding: sample the artist's own colored art ============
   When a piece is first vectorized, seed its (single, per-piece) fill
   from the art frame: find a point guaranteed inside the first closed
   traced shape (scanline test — centroids can land outside concave
   shapes) and sample the art pixel there. The artist owns the value
   afterwards via the Appearance tab. */
function polygonInteriorPoint(pts){
  let minY=Infinity,maxY=-Infinity;
  for(const p of pts){ if(p[1]<minY)minY=p[1]; if(p[1]>maxY)maxY=p[1]; }
  if(minY>=maxY)return null;
  const rows=9;
  let best=null,bestW=-1;
  for(let r=1;r<rows;r++){
    const y=minY+(maxY-minY)*r/rows;
    const xs=[];
    for(let i=0;i<pts.length;i++){
      const a=pts[i], b=pts[(i+1)%pts.length];
      if((a[1]<=y&&b[1]>y)||(b[1]<=y&&a[1]>y)){
        const t=(y-a[1])/(b[1]-a[1]);
        xs.push(a[0]+t*(b[0]-a[0]));
      }
    }
    xs.sort((a,b)=>a-b);
    for(let i=0;i+1<xs.length;i+=2){
      const w=xs[i+1]-xs[i];
      if(w>bestW){bestW=w;best={x:(xs[i]+xs[i+1])/2,y};}
    }
  }
  return best;
}
function artPixelColor(C,wx,wy){
  if(!C.art)return null;
  if(!C._artCv){
    const c=document.createElement('canvas');
    c.width=C.origW;c.height=C.origH;
    c.getContext('2d',{willReadFrequently:true}).drawImage(C.art,0,0,C.origW,C.origH);
    C._artCv=c;
  }
  const x=Math.max(0,Math.min(C.origW-1,Math.round(wx/C.scale)));
  const y=Math.max(0,Math.min(C.origH-1,Math.round(wy/C.scale)));
  const d=C._artCv.getContext('2d').getImageData(x,y,1,1).data;
  if(d[3]<10)return null; // sampled a transparent spot, nothing to fill with
  return '#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
}

/* ================= per-content trace pipeline ================= */
function vectorizeContent(L,C){
  if(!C.dots||!C.lines)return;
  const label = C===L ? layerLabel(L) : (C.name||'variant');
  toast('vectorizing '+label+'…',60000);
  setTimeout(()=>{
    pushUndo();
    const tol=+$('rKey').value, minDot=+$('rDot').value, err=+$('rErr').value;

    const dotsID=imageDataOf(C.dots,C);
    const linesID=imageDataOf(C.lines,C);

    const dotMask=hueMask(dotsID,8,tol);      // red/orange anchor dots
    C.anchors=findBlobs(dotMask,C.W,C.H,minDot);

    const lineMask=hueMask(linesID,100,tol);  // neon-green guide lines
    const skel=thin(lineMask,C.W,C.H);
    C.paths=tracePaths(skel,C.W,C.H);

    // fit
    C.curves=[];
    let totalSegs=0,used=0;
    for(const path of C.paths){
      const pts=path.pts;
      const hits=[];
      for(const d of C.anchors){
        let best=1e9,bi=-1;
        for(let i=0;i<pts.length;i+=2){
          const dd=(pts[i][0]-d.x)**2+(pts[i][1]-d.y)**2;
          if(dd<best){best=dd;bi=i;}
        }
        if(Math.sqrt(best)<Math.max(14,C.W*0.02))hits.push({i:bi});
      }
      hits.sort((a,b)=>a.i-b.i);
      const anchors=[];
      for(const h of hits)if(!anchors.length||h.i-anchors[anchors.length-1].i>6)anchors.push(h);
      used+=anchors.length;

      let cuts=[0,...anchors.map(a=>a.i),pts.length-1];
      cuts=[...new Set(cuts)].sort((a,b)=>a-b);

      const tanAt=(i,dir)=>{
        const k=Math.min(8,Math.floor(pts.length/4)||1);
        const j=Math.max(0,Math.min(pts.length-1,i+dir*k));
        return V.norm(V.sub(pts[j],pts[i]));
      };

      const segsOut=[];
      for(let c=0;c<cuts.length-1;c++){
        const seg=pts.slice(cuts[c],cuts[c+1]+1);
        if(seg.length<2)continue;
        const lt=tanAt(cuts[c],+1);
        const rt=tanAt(cuts[c+1],-1);
        segsOut.push(...fitCurveSeg(seg,lt,rt,err));
      }
      if(segsOut.length){
        C.curves.push({segs:segsOut,closed:path.closed});
        totalSegs+=segsOut.length;
      }
    }

    // seed the piece's fill from the art at first trace (artist can
    // override in Appearance)
    if(L.fill==null && C.art){
      const firstClosed=C.paths.find(p=>p.closed);
      if(firstClosed){
        const ip=polygonInteriorPoint(firstClosed.pts);
        if(ip){ const col=artPixelColor(C,ip.x,ip.y); if(col)L.fill=col; }
      }
    }

    C.traced=C.curves.length>0;
    C.stats = C.traced
      ? `anchors: ${C.anchors.length} (${used} on-path) / paths: ${C.paths.length} / segments: ${totalSegs}`
      : 'nothing keyed';
    renderAll(); draw(); updateExport(); scheduleSave();
    toast(C.traced? `${label}: ${totalSegs} segments` : 'nothing keyed — raise threshold');
  },30);
}

/* re-run selected layer's active content when sliders settle */
let slideT=null;
['rKey','rDot','rErr'].forEach(id=>{
  $(id).addEventListener('change',()=>{
    scheduleSave();
    clearTimeout(slideT);
    slideT=setTimeout(()=>{
      const L=state.layers.find(l=>l.id===state.selId);
      if(!L)return;
      const C=activeContent(L);
      if(C.dots&&C.lines)vectorizeContent(L,C);
    },120);
  });
});

/* ================= export ================= */
function updateExport(){
  const has=state.layers.some(l=>l.visible&&activeContent(l).curves.length);
  $('bExport').disabled=$('bCopy').disabled=!has;
}
function slug(s){ return (s||'keyline').toLowerCase().replace(/[^a-z0-9_-]+/g,'-').replace(/^-+|-+$/g,'')||'keyline'; }

/* entries: [{L, C}] — build one SVG containing those pieces */
/* axis-aligned bounding box of a piece in doc space, accounting for
   rotation around its own center — an unrotated w*h box under-counts
   a rotated piece's true extent (e.g. ~41% wider at 45deg) and would
   clip it out of the exported viewBox */
function pieceBBox(L,C){
  const w=C.origW*L.s, h=C.origH*L.s;
  if(!L.rot)return{x0:L.tx,y0:L.ty,x1:L.tx+w,y1:L.ty+h};
  const cx=w/2,cy=h/2,cos=Math.cos(L.rot),sin=Math.sin(L.rot);
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const[px,py]of[[0,0],[w,0],[0,h],[w,h]]){
    const dx=px-cx,dy=py-cy;
    const rx=dx*cos-dy*sin+cx, ry=dx*sin+dy*cos+cy;
    minX=Math.min(minX,rx);maxX=Math.max(maxX,rx);
    minY=Math.min(minY,ry);maxY=Math.max(maxY,ry);
  }
  return{x0:L.tx+minX,y0:L.ty+minY,x1:L.tx+maxX,y1:L.ty+maxY};
}
function buildSVG(entries){
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  for(const {L,C} of entries){
    if(!C.curves.length)continue;
    const b=pieceBBox(L,C);
    minX=Math.min(minX,b.x0);minY=Math.min(minY,b.y0);
    maxX=Math.max(maxX,b.x1);maxY=Math.max(maxY,b.y1);
  }
  if(minX>maxX){minX=0;minY=0;maxX=state.docW||1000;maxY=state.docH||1000;}
  const f=n=>n.toFixed(2);
  let groups='';
  for(const {L,C} of entries){
    if(!C.curves.length)continue;
    const k=1/C.scale;
    let paths='';
    for(const c of C.curves){
      let d='',last=null;
      for(const seg of c.segs){
        const p0=`${f(seg[0][0]*k)} ${f(seg[0][1]*k)}`;
        if(!last||last!==p0)d+=`M ${p0} `;
        d+=`C ${f(seg[1][0]*k)} ${f(seg[1][1]*k)}, ${f(seg[2][0]*k)} ${f(seg[2][1]*k)}, ${f(seg[3][0]*k)} ${f(seg[3][1]*k)} `;
        last=`${f(seg[3][0]*k)} ${f(seg[3][1]*k)}`;
      }
      if(c.closed)d+='Z';
      paths+=`    <path d="${d.trim()}"${c.closed?'':' fill="none"'}/>\n`;
    }
    const name=slug(C===L?layerLabel(L):(C.name||layerLabel(L)+'-variant'));
    const sw=strokePx(L).toFixed(1);
    // rotate happens around the piece's own center, in the same
    // original-pixel space as the path data, before the doc-scale —
    // mirrors the canvas preview's translate->rotate->scale order
    const rotAttr=L.rot?` rotate(${f(L.rot*180/Math.PI)} ${f(C.origW/2)} ${f(C.origH/2)})`:'';
    groups+=`  <g id="${name}" fill="${L.fill||'none'}" stroke="${L.stroke||'#000'}" stroke-width="${sw}" transform="translate(${f(L.tx)} ${f(L.ty)})${rotAttr} scale(${L.s.toFixed(4)})">\n${paths}  </g>\n`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${minX.toFixed(1)} ${minY.toFixed(1)} ${(maxX-minX).toFixed(1)} ${(maxY-minY).toFixed(1)}" fill="none" stroke-linecap="round" stroke-linejoin="round">\n${groups}</svg>`;
}
function exportEntries(){
  return state.layers
    .filter(l=>l.visible&&activeContent(l).curves.length)
    .map(L=>({L,C:activeContent(L)}));
}
function downloadSVG(entries,name){
  if(!entries.some(e=>e.C.curves.length)){ toast('nothing to export yet'); return; }
  const blob=new Blob([buildSVG(entries)],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=slug(name)+'.svg';a.click();
  toast('SVG downloaded');
}
$('bExport').addEventListener('click',()=>{
  const p=projects.find(x=>x.id===projId);
  downloadSVG(exportEntries(), p?projLabel(p):'keyline');
});
$('bCopy').addEventListener('click',async()=>{
  await navigator.clipboard.writeText(buildSVG(exportEntries()));
  toast('SVG copied');
});

/* ================= project persistence (IndexedDB) =================
   Everything auto-saves on-device, with multiple named projects. Keys:
     'projects'                        -> [{id,name,updated}] index
     'cur'                             -> active project id
     'proj:<pid>:meta'                 -> all serializable layer state
     'proj:<pid>:img:<contentId>:<slot>' -> frame's original file blob
   Content ids cover both a layer's default frames and each variant's.
   Frame blobs are written at upload time; the meta record is
   debounce-written after every meaningful change. The active project
   is restored on page load. Pre-multi-project saves (bare 'meta' +
   'img:*' keys) are migrated to project 1 on first load; v1/v2 metas
   (no variants/appearance) load with defaults. Every call degrades
   silently to in-memory-only if IndexedDB is unavailable. */
let _db=null,_dbDead=false;
function openDB(){
  return new Promise(res=>{
    if(_db)return res(_db);
    if(_dbDead||!window.indexedDB)return res(null);
    let rq;
    try{ rq=indexedDB.open('keyline',1); }
    catch(e){ _dbDead=true; return res(null); }
    rq.onupgradeneeded=()=>rq.result.createObjectStore('project');
    rq.onsuccess=()=>{_db=rq.result;res(_db);};
    rq.onerror=()=>{_dbDead=true;res(null);};
  });
}
function idbOp(mode,fn){
  return openDB().then(d=>new Promise(res=>{
    if(!d)return res(undefined);
    try{
      const tx=d.transaction('project',mode);
      const rq=fn(tx.objectStore('project'));
      tx.oncomplete=()=>res(rq?rq.result:undefined);
      tx.onerror=tx.onabort=()=>res(undefined);
    }catch(e){res(undefined);}
  }));
}
const idbPut=(k,v)=>idbOp('readwrite',s=>s.put(v,k));
const idbGet=k=>idbOp('readonly',s=>s.get(k));
const idbDel=k=>idbOp('readwrite',s=>s.delete(k));
const idbKeys=()=>idbOp('readonly',s=>s.getAllKeys());

let projId=1, projects=[], loadSeq=0;
const imgKey=(contentId,slot)=>'proj:'+projId+':img:'+contentId+':'+slot;
const projLabel=p=>p.name||('project '+p.id);
function saveProjectsIndex(){ idbPut('projects',projects); idbPut('cur',projId); }

function serContent(C){
  return {
    id:C.id, name:C.name, origW:C.origW, origH:C.origH, scale:C.scale, W:C.W, H:C.H,
    anchors:C.anchors, paths:C.paths, curves:C.curves, traced:C.traced, stats:C.stats||'',
    frames:['art','dots','lines'].filter(k=>C[k]),
  };
}
let saveT=null;
function scheduleSave(){ clearTimeout(saveT); saveT=setTimeout(saveProject,300); }
function flushSave(){ if(saveT){ clearTimeout(saveT); saveProject(); } }
function saveProject(){
  saveT=null;
  const p=projects.find(x=>x.id===projId);
  if(p){ p.updated=Date.now(); saveProjectsIndex(); }
  idbPut('proj:'+projId+':meta',{
    v:3, uid, selId:state.selId, docW:state.docW, docH:state.docH,
    bgColor:$('bgColorInput').value,
    sliders:{key:+$('rKey').value, dot:+$('rDot').value, err:+$('rErr').value},
    layers:state.layers.map(L=>({
      ...serContent(L),
      visible:L.visible!==false, fill:L.fill??null, stroke:L.stroke||'#000000',
      strokeW:L.strokeW==null?2:L.strokeW,
      tx:L.tx, ty:L.ty, s:L.s, rot:L.rot||0,
      activeVar:L.activeVar==null?-1:L.activeVar,
      variants:(L.variants||[]).map(serContent),
    })),
  });
}

function blobToImage(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{ const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=r.result; };
    r.onerror=rej;
    r.readAsDataURL(blob); // same data-URL rationale as the upload path
  });
}
async function hydrateContent(C,m,pid){
  Object.assign(C,{
    id:m.id, name:m.name||'', origW:m.origW, origH:m.origH, scale:m.scale, W:m.W, H:m.H,
    anchors:m.anchors||[], paths:m.paths||[], curves:m.curves||[],
    traced:!!m.traced, stats:m.stats||'',
  });
  for(const slot of m.frames||[]){
    const blob=await idbGet('proj:'+pid+':img:'+m.id+':'+slot);
    if(blob){ try{ C[slot]=await blobToImage(blob); }catch(e){} }
  }
}
function resetState(){
  clearTimeout(saveT); saveT=null;
  undoStack.length=0; redoStack.length=0; updateHistoryUI();
  closeVarPage();
  state.layers=[]; state.selId=null; state.docW=0; state.docH=0; state.viewInit=false;
  setBgColor('#10131f');
  renderAll(); draw(); updateExport();
}

async function loadProject(pid){
  const my=++loadSeq;
  projId=pid; idbPut('cur',pid);
  try{
    const meta=await idbGet('proj:'+pid+':meta');
    if(!meta||!meta.layers||!meta.layers.length){
      if(my===loadSeq){ renderAll(); draw(); updateExport(); }
      return;
    }
    toast('loading project…',20000);
    const layers=[];
    for(const m of meta.layers){
      const L=newLayer();
      await hydrateContent(L,m,pid);
      L.visible=m.visible!==false;
      // v1/v2 metas kept per-curve fills; adopt the first as the piece fill
      L.fill = m.fill!==undefined ? m.fill : ((m.curves||[]).find(c=>c.fill)?.fill ?? null);
      L.stroke=m.stroke||'#000000';
      L.strokeW=m.strokeW==null?2:m.strokeW;
      L.tx=m.tx||0; L.ty=m.ty||0; L.s=m.s||1; L.rot=m.rot||0;
      L.activeVar=m.activeVar==null?-1:m.activeVar;
      L.variants=[];
      for(const vm of m.variants||[]){
        const v=newContent();
        await hydrateContent(v,vm,pid);
        L.variants.push(v);
      }
      if(L.activeVar>=L.variants.length)L.activeVar=-1;
      layers.push(L);
    }
    if(my!==loadSeq)return; // a newer load/new-project superseded this one
    state.layers=layers;
    uid=Math.max(uid,meta.uid||1);
    state.selId=meta.selId??null;
    state.docW=meta.docW||0; state.docH=meta.docH||0;
    if(meta.sliders){
      $('rKey').value=meta.sliders.key; $('oKey').textContent=meta.sliders.key;
      $('rDot').value=meta.sliders.dot; $('oDot').textContent=meta.sliders.dot;
      $('rErr').value=meta.sliders.err; $('oErr').textContent=meta.sliders.err;
    }
    setBgColor(meta.bgColor||'#10131f');
    undoStack.length=0; redoStack.length=0; updateHistoryUI();
    state.viewInit=false;
    renderAll(); fitView(); updateExport();
    const p=projects.find(x=>x.id===pid);
    toast((p?projLabel(p):'project')+' restored');
  }catch(e){ toast('couldn’t load saved project',3000); }
}

/* project switcher UI */
function refreshProjUI(){
  const sel=$('projSel'); sel.innerHTML='';
  for(const p of [...projects].sort((a,b)=>a.id-b.id)){
    const o=document.createElement('option');
    o.value=p.id; o.textContent=projLabel(p);
    if(p.id===projId)o.selected=true;
    sel.appendChild(o);
  }
  const p=projects.find(x=>x.id===projId);
  $('projName').value=p&&p.name?p.name:'';
}
$('projSel').addEventListener('change',async e=>{
  const pid=+e.target.value;
  if(pid===projId)return;
  flushSave();
  resetState();
  await loadProject(pid);
  refreshProjUI();
});
let nameT=null;
$('projName').addEventListener('input',e=>{
  const p=projects.find(x=>x.id===projId);
  if(!p)return;
  p.name=e.target.value;
  const o=$('projSel').querySelector('option[value="'+projId+'"]');
  if(o)o.textContent=projLabel(p);
  clearTimeout(nameT); nameT=setTimeout(saveProjectsIndex,300);
});
$('bNewProj').addEventListener('click',()=>{
  flushSave();
  const pid=projects.reduce((m,p)=>Math.max(m,p.id),0)+1;
  projects.push({id:pid,name:'',updated:Date.now()});
  projId=pid;
  loadSeq++; // cancel any in-flight load
  resetState();
  saveProjectsIndex();
  refreshProjUI();
  $('drawer').classList.remove('open');
  toast('new project — add a layer to begin');
});
$('bDelProj').addEventListener('click',async()=>{
  const p=projects.find(x=>x.id===projId);
  if(!await askConfirm('Delete “'+projLabel(p||{id:projId})+'” and all its pieces?'))return;
  clearTimeout(saveT); saveT=null;
  const pid=projId;
  projects=projects.filter(x=>x.id!==pid);
  const keys=(await idbKeys())||[];
  for(const k of keys)if(String(k).startsWith('proj:'+pid+':'))idbDel(k);
  if(!projects.length)projects=[{id:pid+1,name:'',updated:Date.now()}];
  const next=[...projects].sort((a,b)=>(b.updated||0)-(a.updated||0))[0];
  projId=next.id;
  saveProjectsIndex();
  resetState();
  await loadProject(next.id);
  refreshProjUI();
  $('drawer').classList.remove('open');
  toast('project deleted');
});

/* migrate pre-multi-project saves (bare 'meta' + 'img:*') to project 1 */
async function migrateLegacy(){
  const legacy=await idbGet('meta');
  if(!legacy)return;
  await idbPut('proj:1:meta',legacy);
  const keys=(await idbKeys())||[];
  for(const k of keys){
    const ks=String(k);
    if(ks.startsWith('img:')){
      const v=await idbGet(k);
      if(v!==undefined)await idbPut('proj:1:'+ks,v);
      await idbDel(k);
    }
  }
  await idbDel('meta');
  if(!(await idbGet('projects')))await idbPut('projects',[{id:1,name:'',updated:Date.now()}]);
  await idbPut('cur',1);
}

renderAll();
fitView();
updateHistoryUI();
refreshArtToggle();
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(()=>{});
(async function initProjects(){
  try{
    await migrateLegacy();
    projects=(await idbGet('projects'))||[];
    let cur=await idbGet('cur');
    if(!projects.length){ projects=[{id:1,name:'',updated:Date.now()}]; cur=1; saveProjectsIndex(); }
    if(!projects.some(p=>p.id===cur))cur=projects[0].id;
    projId=cur;
    refreshProjUI();
    await loadProject(cur);
    refreshProjUI();
  }catch(e){}
})();
</script>
